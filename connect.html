<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<link rel="stylesheet" href="connect.css">
<body>
<form action="\getdata" method="post" id ="login_form">
<h1 id ="title">Login</h1>
<div id="change_forms">
<div id="login_first" class="forms_btns">Login</div><div id="signup_first"class="forms_btns signup">Signup</div>
</div>
<input type ="text" id="username" name="username" placeholder="Username" minlength="3" maxlength="10" autocomplete="on" required></input>
<input type ="password" id="password" name="password" placeholder="Password"  minlength="7" maxlength="10" required></input>
<a href="" id ="password_link" class = "link">Forgot password?</a>
<button type ="submit">Login</button>
<div id ="member_link"><label for="member">Not a member?</label><a href="#" id="member_sign" class = "link">Signup now</a></div>
</form>

<form action="\getdata" method="post" id ="signup_form">
<h1 id ="title">Signup</h1>
<div id="change_forms">
<div id="login_second" class="forms_btns login">Login</div><div href="" id="signup_second"class="forms_btns">Signup</div>
</div>
<input type ="text" id="username" name="username"  minlength="3" maxlength="10" placeholder="Username" required></input>
<input type ="password" id="password" name="password" minlength="7" maxlength="10" placeholder="Password" required></input>
<button type ="submit">Signup</button>
<div id ="member_link"><label for="member_log">Already have an account?</label><a href="#" id="member_log" class = "link">Login</a></div>
</form>
<script src="connect.js"></script>
<a href="rooms.html" style="position:absolute;bottom: 10%;">Rooms</a>
</body>
</html>
