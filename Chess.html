<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href="style.css">
    <title>Chess</title>
</head>
<body>
<h2 id = "turn">White's Turn</h2>
<div id ="timerpopup">
<div class="timer"id="timer_white">10:00</div>
<div class="timer"id="timer_black">10:00</div>   
</div>
<div id="promotion" class="promote">
    <div class="promote-content">
      <p>What do you want to promote to?</p>
      <img id = "rook" class = "promote_pieces black" src = "chess-36314_1280.png" draggable="false" onClick ="board.pawn_promote(this)"></img>
      <img id = "knight" class = "promote_pieces black" src = "knight-147065_1280.png" draggable="false" onClick ="board.pawn_promote(this)"></img>
      <img id = "bishop" class = "promote_pieces black" src = "bishop-147064_1280.png" draggable="false" onClick ="board.pawn_promote(this)"></img>
      <img id = "queen" class = "promote_pieces black" src = "queen-147062_1280.png" draggable="false" onClick ="board.pawn_promote(this)"></img>
    </div>
  </div>
  <img class = "background" src="chess-game.jpg"></img>
<div class="wrapper" id="chess_board_wrapper">
<div id = "chess_board" class = "board">

        <div class="alfabet_cor">a</div>
        <div class="alfabet_cor">b</div>
        <div class="alfabet_cor">c</div>
        <div class="alfabet_cor">d</div>

        <div class="number_cor">5</div>
        <div class="number_cor">6</div>
        <div class="number_cor">7</div>
        <div class="number_cor" id="cor8">8</div>
        </div>
